<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carte Pop Art - Sous-Territoires</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Poppins:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --ivoire: #F9F9F4;
    --canard: #007B83;
    --jaune: #FFCC00;
    --noir: #000000;
    
    /* Variables de style Pop Art */
    --bordure: 3px solid var(--noir);
    --ombre-solide: 6px 6px 0px var(--noir);
    --ombre-solide-petite: 3px 3px 0px var(--noir);
    --arrondi: 20px;
    --arrondi-max: 30px;
    
    /* Couleurs par sous-territoires */
    --cat-amikuze: #FF3B30;   /* Rouge */
    --cat-errobi: #007B83;    /* Bleu canard */
    --cat-cba: #FFCC00;       /* Jaune */
    --cat-seignanx: #34C759;  /* Vert */
  }
  
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body { 
    font-family: 'Poppins', sans-serif; 
    background-color: var(--ivoire);
    color: var(--noir); 
    height: 100vh; 
    overflow: hidden; 
    position: relative;
  }

  /* Carte en plein écran */
  #map { 
    position: absolute;
    top: 0; bottom: 0; left: 0; right: 0;
    background: var(--ivoire);
    z-index: 1;
  }

  /* En-tête flottant Pop Art */
  .header {
    position: absolute;
    top: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--canard);
    border: var(--bordure);
    border-radius: var(--arrondi-max);
    box-shadow: var(--ombre-solide);
    padding: 16px 32px;
    z-index: 1000;
    text-align: center;
    width: 90%;
    max-width: 650px;
  }
  .header h1 { 
    font-family: 'Montserrat', sans-serif;
    font-weight: 900;
    font-size: 24px;
    color: var(--jaune);
    text-transform: uppercase;
    letter-spacing: -1px;
    text-shadow: 2px 2px 0px var(--noir); 
    line-height: 1.1;
  }
  .header p { 
    font-size: 14px; 
    font-weight: 600;
    color: var(--ivoire); 
    margin-top: 6px; 
  }

  /* Légende flottante */
  .legend {
    position: absolute;
    bottom: 30px;
    right: 30px;
    background: var(--ivoire);
    border: var(--bordure);
    border-radius: var(--arrondi);
    box-shadow: var(--ombre-solide);
    padding: 20px 24px;
    z-index: 1000;
  }
  .legend h3 { 
    font-family: 'Montserrat', sans-serif;
    font-size: 15px;
    font-weight: 900;
    text-transform: uppercase; 
    letter-spacing: -0.5px;
    margin-bottom: 16px; 
  }
  .legend-item { 
    display: flex; 
    align-items: center; 
    gap: 12px; 
    margin-bottom: 12px; 
    font-size: 14px; 
    font-weight: 600; 
  }
  .legend-item:last-child { margin-bottom: 0; }
  .dot { 
    width: 20px; 
    height: 20px; 
    border-radius: 50%; 
    border: 2px solid var(--noir); 
    box-shadow: var(--ombre-solide-petite);
  }

  /* Personnalisation brutale des popups Leaflet */
  .leaflet-popup-content-wrapper { 
    background: var(--ivoire);
    border: var(--bordure);
    border-radius: var(--arrondi);
    box-shadow: var(--ombre-solide) !important; 
    padding: 0;
  }
  .leaflet-popup-tip-container { display: none; }
  .leaflet-popup-content { margin: 20px; }
  
  .custom-popup .title { 
    font-family: 'Montserrat', sans-serif;
    font-weight: 900; 
    font-size: 18px; 
    margin-bottom: 12px; 
    line-height: 1.1; 
    color: var(--canard);
    letter-spacing: -0.5px;
  }
  .custom-popup .cat-badge { 
    display: inline-flex; 
    align-items: center; 
    gap: 8px; 
    font-size: 11px; 
    font-weight: 700; 
    padding: 6px 12px; 
    border-radius: var(--arrondi-max); 
    text-transform: uppercase; 
    margin-bottom: 14px; 
    background: var(--ivoire);
    border: 2px solid var(--noir);
    box-shadow: 2px 2px 0px var(--noir);
    color: var(--noir);
  }
  
  .custom-popup .note { 
    font-size: 13px; 
    font-weight: 500;
    font-style: italic;
    background: var(--noir);
    color: var(--ivoire);
    padding: 12px 14px;
    border-radius: 12px;
    line-height: 1.5;
  }

  a.leaflet-popup-close-button {
    color: var(--noir) !important;
    font-weight: 900 !important;
    font-size: 20px !important;
    padding: 8px !important;
  }
</style>
</head>
<body>

  <div class="header">
    <h1>Carte des Acteurs</h1>
    <p>Mission Locale Pays Basque - Répartition par territoires</p>
  </div>

  <div id="map"></div>
    
  <div class="legend">
    <h3>Territoires</h3>
    <div class="legend-item"><div class="dot" style="background:var(--cat-amikuze)"></div> Amikuze / Xiberoa / Garazi / Sud PB</div>
    <div class="legend-item"><div class="dot" style="background:var(--cat-errobi)"></div> Errobi / Pays d'Hasparren</div>
    <div class="legend-item"><div class="dot" style="background:var(--cat-cba)"></div> Côte Basque Adour</div>
    <div class="legend-item"><div class="dot" style="background:var(--cat-seignanx)"></div> Pays du Seignanx</div>
  </div>

<script>
// Données pré-chargées avec les nouvelles catégories (sous-territoires)
const initialPins = [
  // Amikuze / Xiberoa / Garazi / Sud PB
  {name: "Lycée Jean Errecart", cat: "amikuze", note: "305 Rte des Écoles, 64120 Saint-Palais", lat: 43.328, lng: -1.033},
  {name: "Bilbaka", cat: "amikuze", note: "95 Ainaren Karrika, 64120 Saint-Palais", lat: 43.330, lng: -1.035},
  {name: "Akiloukap", cat: "amikuze", note: "18 Rue d'Espagne, 64220 Saint-Jean-Pied-de-Port", lat: 43.163, lng: -1.237},
  {name: "Les Récoltes du monde", cat: "amikuze", note: "2 Rue de l'Église, 64220 Saint-Jean-Pied-de-Port", lat: 43.163, lng: -1.236},
  {name: "Grottes d'Urdax", cat: "amikuze", note: "Barrio Leorlas, 31711 Urdazubi", lat: 43.266, lng: -1.503},
  {name: "Berritza", cat: "amikuze", note: "4 Rue de l'Alava, 64130 Mauléon-Licharre", lat: 43.222, lng: -0.888},
  {name: "Philippe Mayté (Lecture Paysage)", cat: "amikuze", note: "Château Fort, 64130 Mauléon-Licharre", lat: 43.220, lng: -0.887},
  {name: "Goizeko Izarra", cat: "amikuze", note: "Place Charles de Gaulle, 64220 Saint-Jean-Pied-de-Port", lat: 43.164, lng: -1.237},
  {name: "Trainière de Socoa", cat: "amikuze", note: "Chemin des Blocs, 64500 Ciboure", lat: 43.385, lng: -1.667},
  {name: "Grottes de Zugarramurdi", cat: "amikuze", note: "Beitikokarrika 18, 31710 Zugarramurdi", lat: 43.268, lng: -1.501},
  {name: "Odace", cat: "amikuze", note: "14 Rue des Frères Barenne, 64130 Mauléon-Licharre", lat: 43.224, lng: -0.890},
  {name: "AZIA", cat: "amikuze", note: "Maison du Patrimoine, 64130 Mauléon-Licharre", lat: 43.223, lng: -0.888},
  {name: "SPI AERO", cat: "amikuze", note: "Rue du Sécateur, 64130 Mauléon-Licharre", lat: 43.227, lng: -0.895},
  {name: "Ataria", cat: "amikuze", note: "Citadelle, 64220 Saint-Jean-Pied-de-Port", lat: 43.162, lng: -1.235},
  {name: "MSP Garazi", cat: "amikuze", note: "11 Rue des Bergers, 64220 Saint-Jean-Pied-de-Port", lat: 43.165, lng: -1.239},
  {name: "Lokala", cat: "amikuze", note: "630 Route de Bayonne, 64220 Ascarat", lat: 43.168, lng: -1.258},
  {name: "CPIE Littoral Basque", cat: "amikuze", note: "Domaine d'Abbadia, 64700 Hendaye", lat: 43.376, lng: -1.750},

  // Errobi / Pays d'Hasparren
  {name: "ALDATU", cat: "errobi", note: "Lotissement Larraidy, 64240 Hasparren", lat: 43.383, lng: -1.304},
  {name: "Régis Pochelu", cat: "errobi", note: "1005 Chemin de Xurruta, 64240 Hasparren", lat: 43.381, lng: -1.300},
  {name: "Château Garroa", cat: "errobi", note: "64240 Mendionde", lat: 43.344, lng: -1.298},
  {name: "Librairie Margot", cat: "errobi", note: "10 Allée Anne de Neubourg, 64250 Cambo-les-Bains", lat: 43.360, lng: -1.400},
  {name: "Imprimerie Mendiboure", cat: "errobi", note: "8 Rue du Cardinal Lavigerie, 64250 Cambo-les-Bains", lat: 43.359, lng: -1.398},

  // Côte Basque Adour
  {name: "Groupe IZARRALDE", cat: "cba", note: "45 Allée Théodore Monod, 64210 Bidart", lat: 43.438, lng: -1.590},
  {name: "Cinéma L'Atalante", cat: "cba", note: "3 Quai Amiral Antoine Sala, 64100 Bayonne", lat: 43.493, lng: -1.468},
  {name: "Grandola", cat: "cba", note: "4 Rue des Tonneliers, 64100 Bayonne", lat: 43.491, lng: -1.474},
  {name: "Office de Tourisme de Bayonne", cat: "cba", note: "25 Place de la Liberté, 64100 Bayonne", lat: 43.492, lng: -1.475},

  // Pays du Seignanx
  {name: "Mairie de Tarnos", cat: "seignanx", note: "1 Boulevard de la Libération, 40220 Tarnos", lat: 43.540, lng: -1.463},
  {name: "Corbo Course", cat: "seignanx", note: "9B Avenue de la Légion Tchèque, 64100 Bayonne", lat: 43.497, lng: -1.470},
  {name: "Tube à essai / PTCE", cat: "seignanx", note: "23 Rue Hélène Boucher, 40220 Tarnos", lat: 43.535, lng: -1.465},
  {name: "Métrolocco", cat: "seignanx", note: "23 Rue Hélène Boucher, 40220 Tarnos", lat: 43.535, lng: -1.465}
];

// Configuration des catégories avec les couleurs "Pop" par territoire
const CAT_COLORS = { 
  amikuze: '#FF3B30', 
  errobi: '#007B83', 
  cba: '#FFCC00', 
  seignanx: '#34C759' 
};
const CAT_LABELS = { 
  amikuze: 'Amikuze / Xiberoa / Garazi', 
  errobi: "Errobi / Pays d'Hasparren", 
  cba: 'Côte Basque Adour', 
  seignanx: 'Pays du Seignanx' 
};

// Initialisation de la carte
const map = L.map('map', {zoomControl: false}); 

// On replace le contrôle de zoom en bas à gauche 
L.control.zoom({ position: 'bottomleft' }).addTo(map);

// Fond de carte : STYLE GOOGLE MAPS STANDARD
L.tileLayer('https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', {
  maxZoom: 20,
  attribution: '&copy; Google Maps'
}).addTo(map);

// Fonction pour créer l'icône du point
function makePinIcon(color){
  return L.divIcon({
    className: '',
    html: `<div style="width:24px;height:24px;background:${color};border-radius:50%;border:3px solid #000;box-shadow:3px 3px 0px #000; transition: transform 0.2s;"></div>`,
    iconSize: [24, 24],
    iconAnchor: [12, 12],
    popupAnchor: [0, -16]
  });
}

const markersGroup = L.featureGroup().addTo(map);

initialPins.forEach(function(p){
  const color = CAT_COLORS[p.cat];
  const label = CAT_LABELS[p.cat];
  
  // Design "Pop Art" de la popup
  const popHtml = `
    <div class="custom-popup" style="min-width: 220px;">
      <div class="title">${p.name}</div>
      <div class="cat-badge" style="background:${color}; ${color === '#FFCC00' ? 'color:#000;' : 'color:#fff;'}">
        <div style="width:10px;height:10px;border-radius:50%;background:#fff;border:2px solid #000;"></div>
        ${label}
      </div>
      ${p.note ? `<div class="note">"${p.note}"</div>` : ''}
    </div>
  `;

  const marker = L.marker([p.lat, p.lng], { icon: makePinIcon(color) });
  marker.bindPopup(popHtml, { maxWidth: 320 });
  markersGroup.addLayer(marker);
});

// Ajustement automatique de la vue
map.fitBounds(markersGroup.getBounds(), { padding: [80, 80] });

</script>
</body>
</html>
