    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        header: ['Fredoka', 'sans-serif'],
                        body: ['Nunito', 'sans-serif'],
                    },
                    colors: {
                        darkBg: '#1a1a1a',
                        cyanAccent: '#12b4c8',
                        yellowAccent: '#ffb703',

            }
        }

    <!-- Leaflet CSS & JS -->

    <style>
        /* Styles Marqueurs Néo-brutalistes */
        .custom-div-icon { background: transparent; border: none; }
        .marker-pin {
            width: 32px; height: 32px;
            border-radius: 50% 50% 50% 0;
            position: absolute;
            transform: rotate(-45deg);
            left: 50%; top: 50%;
            margin: -16px 0 0 -16px;
            border: 2px solid #1a1a1a;
            box-shadow: 2px 2px 0px 0px rgba(0,0,0,1);
            display: flex; align-items: center; justify-content: center;
        }
        .marker-icon { transform: rotate(45deg); color: #1a1a1a; font-size: 14px; }

        /* Couleurs Thématiques */
        .theme-culture { background: #d946ef; }
        .theme-institution { background: #3b82f6; }
        .theme-entreprise { background: #10b981; }
        .theme-repas { background: #ffb703; }
        .theme-ralliement { background: #ef4444; }

        /* Popups Leaflet */
        .leaflet-popup-content-wrapper {
            background: #ffffff; color: #1a1a1a;
            border: 3px solid #1a1a1a; border-radius: 12px;
            box-shadow: 4px 4px 0px 0px rgba(0,0,0,1);
            padding: 0;
        }
        .leaflet-popup-tip-container { display: none; }
        .leaflet-popup-content { margin: 12px; width: 250px !important; }

        /* Ajustements UI */
        #map { height: 100%; width: 100%; z-index: 10; }
        .drawer-transition { transition: transform 0.3s ease-in-out; }

        /* Checkbox style */
        .custom-checkbox:checked + div { background-color: #1a1a1a; border-color: #1a1a1a; }
        .custom-checkbox:checked + div svg { display: block; }

        .zone-checkbox:checked + div { background-color: #f3f4f6; border-color: #1a1a1a; box-shadow: 2px 2px 0px 0px black; }
        .zone-checkbox:not(:checked) + div { opacity: 0.6; box-shadow: none; border-color: #ccc; }
        .zone-checkbox:checked + div .indicator { background-color: #10b981; }
        .zone-checkbox:not(:checked) + div .indicator { background-color: #ef4444; }
        
        body.drawer-open { overflow: hidden; }

        /* Scrollbar pour le menu */
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #888; border-radius: 4px; }

<body class="bg-[#f8f9fa] h-screen overflow-hidden flex flex-col font-body">

            { zone: 'errobi', lat: 43.385, lng: -1.305, type: 'culture', title: 'Soinubila', address: 'Hasparren', legend: 'Ecole de musique', time: 'A définir', contact: '07 61 89 44 34' },
            { zone: 'errobi', lat: 43.365, lng: -1.255, type: 'culture', title: '2-Château Garroa', address: 'Mendionde', legend: 'Visite', time: 'A définir', contact: '06,70182640 / 0678939578' },
            { zone: 'errobi', lat: 43.386, lng: -1.306, type: 'culture', title: 'Régis Pochelu', address: 'Hasparren', legend: 'Sculpteur', time: 'A définir', contact: '0626721838' },
            { zone: 'errobi', lat: 43.384, lng: -1.304, type: 'culture', title: '1- Ferme Uhaldia', address: 'Hasparren', legend: 'Visite Ferme', time: 'A définir', contact: 'Julia Abadie' },
            { zone: 'errobi', lat: 43.383, lng: -1.304, type: 'institution', title: 'ALDATU', address: 'Hasparren', legend: '24-03 : Visite/Rencontre', time: '14:00 - 16:00' },
            { zone: 'errobi', lat: 43.382, lng: -1.303, type: 'repas', title: 'Restaurant Argia', address: 'Hasparren', legend: '24-03 : Repas', time: 'A définir', contact: '05.59.29...' }
        ];

        // Persistence des horaires modifiés
        const savedTimes = JSON.parse(localStorage.getItem('plt_full_times') || '{}');

        function getPopupHTML(loc, index) {
            const theme = themes[loc.type];
            
            const contactHTML = loc.contact ? `
                <div class="flex items-start gap-2 mb-2 bg-gray-50 p-2 rounded border border-gray-200 shadow-sm">
                    <i class="fa-solid fa-phone text-[10px] mt-0.5" style="color: ${theme.hex}"></i>
                    <span class="text-[10px] font-bold text-gray-700 leading-tight">${loc.contact}</span>
                </div>
            ` : '';

            // Zone pill styling
            let zoneName = "Plénière";
            let zoneColor = "bg-gray-200 text-gray-800";
            if(loc.zone === 'amikuze') { zoneName = "Amikuze"; zoneColor = "bg-orange-100 text-orange-800 border-orange-300"; }
            if(loc.zone === 'garazi') { zoneName = "Garazi"; zoneColor = "bg-red-100 text-red-800 border-red-300"; }
            if(loc.zone === 'sudpb') { zoneName = "Sud PB"; zoneColor = "bg-blue-100 text-blue-800 border-blue-300"; }
            if(loc.zone === 'errobi') { zoneName = "Errobi"; zoneColor = "bg-green-100 text-green-800 border-green-300"; }
            if(loc.zone === 'bab') { zoneName = "CBA (BAB)"; zoneColor = "bg-cyan-100 text-cyan-800 border-cyan-300"; }
            if(loc.zone === 'seignanx') { zoneName = "Seignanx"; zoneColor = "bg-purple-100 text-purple-800 border-purple-300"; }

            return `
                <div class="font-body">
                    <div class="flex items-center gap-1 mb-2">
                        <span class="inline-block px-2 py-0.5 text-[8px] font-black uppercase rounded border-2 border-black shadow-[1px_1px_0px_0px_black]" style="background-color: ${theme.hex}; color: ${loc.type==='repas'?'black':'white'}">
                            ${loc.type}
                        </span>
                        <span class="inline-block px-1.5 py-0.5 text-[7px] font-bold uppercase rounded border ${zoneColor}">
                            <i class="fa-solid fa-map-location-dot mr-1"></i> ${zoneName}
                        </span>
                    </div>
                    
                    <h3 class="text-sm font-bold font-header text-darkBg leading-tight mb-1">${loc.title}</h3>
                    
                    <div class="flex items-center gap-2 mb-3">
                        <i class="fa-regular fa-clock text-cyanAccent text-[10px]"></i>
                        <span id="t-disp-${index}" onclick="editTime(${index})" class="bg-yellow-50 px-2 py-0.5 rounded border border-black font-black cursor-pointer text-[10px] shadow-[1px_1px_0px_0px_black] hover:bg-yellow-200 transition-colors">
                            ${loc.time}
                        </span>
                        <div id="t-edit-${index}" class="hidden flex gap-1">
                            <input type="text" id="t-in-${index}" value="${loc.time}" class="w-16 border border-black rounded p-0.5 text-[10px] font-bold">
                            <button onclick="saveTime(${index})" class="bg-emerald-500 text-white px-2 py-0.5 rounded border border-black text-[10px] shadow-[1px_1px_0px_0px_black] active:translate-y-0.5 active:shadow-none"><i class="fa-solid fa-check"></i></button>
                        </div>
                    </div>

                    ${contactHTML}

                    <div class="bg-white rounded-lg p-2 border-2 border-black text-[10px] font-bold leading-snug shadow-[2px_2px_0px_0px_rgba(0,0,0,0.1)]">
                        ${loc.legend}
                    </div>
                </div>
            `;
        }

        window.editTime = (i) => {
            document.getElementById(`t-disp-${i}`).classList.add('hidden');
            document.getElementById(`t-edit-${i}`).classList.remove('hidden');
            document.getElementById(`t-in-${i}`).focus();
        };

        window.saveTime = (i) => {
            const val = document.getElementById(`t-in-${i}`).value;
            locations[i].time = val;
            const data = JSON.parse(localStorage.getItem('plt_full_times') || '{}');
            data[i] = val;
            localStorage.setItem('plt_full_times', JSON.stringify(data));
            locations[i].marker.getPopup().setContent(getPopupHTML(locations[i], i));
        };

        // Création des marqueurs
        locations.forEach((loc, i) => {
            if(savedTimes[i]) loc.time = savedTimes[i];
            const theme = themes[loc.type];
            const icon = L.divIcon({
                className: 'custom-div-icon',
                html: `<div class="marker-pin ${theme.css}"><i class="${theme.icon} marker-icon"></i></div>`,
                iconSize: [32, 32], iconAnchor: [16, 32], popupAnchor: [0, -32]
            });
            loc.marker = L.marker([loc.lat, loc.lng], { icon: icon }).bindPopup(getPopupHTML(loc, i));
            // Ajout initial
            loc.marker.addTo(map);
        });

        // Fonction de filtrage croisé (Thème ET Zone)
        function updateFilters() {
            const activeZones = Array.from(document.querySelectorAll('.zone-checkbox:checked')).map(cb => cb.value);
            const activeThemes = Array.from(document.querySelectorAll('.custom-checkbox:checked')).map(cb => cb.value);

            locations.forEach(loc => {
                const zoneMatch = activeZones.includes(loc.zone);
                const themeMatch = activeThemes.includes(loc.type);

                if (zoneMatch && themeMatch) {
                    if (!map.hasLayer(loc.marker)) {
                        map.addLayer(loc.marker);
                    }
                } else {
                    if (map.hasLayer(loc.marker)) {
                        map.removeLayer(loc.marker);
                    }
                }
            });
        }

        // Écouteurs d'événements pour TOUS les filtres
        document.querySelectorAll('.filter-trigger').forEach(el => {
            el.addEventListener('change', updateFilters);
        });

        // Géolocalisation
        window.locateMe = () => { map.locate({setView: true, maxZoom: 15}); };
        map.on('locationfound', (e) => {
            L.circle(e.latlng, e.accuracy, { color: '#12b4c8', weight: 1, fillOpacity: 0.1 }).addTo(map);
        });

    </script>
</body>
</html>
